<div class="viewer-shell">
  <div *ngIf="loading" class="status">Loading…</div>
  <div *ngIf="error" class="status error">Error loading PDF</div>

  <div *ngIf="fileUrl && !loading && !error" class="content-layout">
    <!-- 🔹 LEFT: Metadata -->
    <div class="metadata-panel">
      <h3>File Details</h3>
      <table class="table table-striped">
        <tbody>
          <ng-container *ngIf="metadata$ | async as metadata">
            <tr *ngFor="let mdEntry of metadata">
              <td>{{ mdEntry.label }}</td>
              <td>
                <span *ngFor="let mdValue of mdEntry.value">{{ mdValue.value }}</span>
              </td>
            </tr>
          </ng-container>
        </tbody>
      </table>

      <button class="btn btn-primary mt-3" (click)="downloadPdf()">
        Download PDF
      </button>
    </div>

    <!-- 🔹 RIGHT: PDF -->
    <div class="pdf-panel">
      <!-- <div class="toolbar mb-2">
        <button (click)="zoomOut()">-</button>
        <button (click)="resetZoom()">Reset</button>
        <button (click)="zoomIn()">+</button>
      </div> -->

      <div class="scale-wrapper"
           [style.transform]="'scale(' + zoomLevel + ')'"
           style="transform-origin: top left; height: 100%; width: 100%;">
        <iframe [src]="fileUrl"
                class="pdf-iframe"
                class="pdf-iframe"
                frameborder="0"></iframe>
      </div>
    </div>
  </div>

  <div *ngIf="!fileUrl && !loading && !error" class="no-pdf">
    <p>No PDF available.</p>
  </div>
</div>
