  <div *ngIf="loading" class="status">Loading…</div>
  <div *ngIf="error" class="status error">Error loading PDF</div>

  <div *ngIf="fileUrl && !loading && !error" class="pdf-viewer">
    <div class="scale-wrapper"
         [style.transform]="'scale(' + zoomLevel + ')'"
         style="transform-origin: top left;">
      <iframe [src]="fileUrl" class="pdf-iframe" frameborder="0" width="100%" height="800"></iframe>
    </div>
  </div>

  <div *ngIf="!fileUrl && !loading && !error" class="no-pdf">
    <p>No PDF available.</p>
  </div>

</div>
